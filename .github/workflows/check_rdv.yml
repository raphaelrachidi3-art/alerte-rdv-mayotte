name: 🔔 Alerte RDV Préfecture Mayotte

on:
  schedule:
    - cron: '* * * * *'  # Toutes les 1 minute
  workflow_dispatch:       # Permet aussi de lancer manuellement

jobs:
  check-rdv:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v3

      - name: 🐍 Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Installer les dépendances
        run: pip install requests

      - name: 🔍 Vérifier les créneaux disponibles
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FREE_USER: ${{ secrets.FREE_USER }}
          FREE_KEY: ${{ secrets.FREE_KEY }}
        run: python check_rdv.py
